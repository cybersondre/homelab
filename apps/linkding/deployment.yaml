apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      containers:
      - name: linkding
        image: sissbruecker/linkding:latest
        ports:
        - containerPort: 9090
        env:
        - name: LD_DB_ENGINE
          value: postgres
        - name: LD_DB_HOST
          value: postgres-rw.cnpg-system.svc.cluster.local
        - name: LD_DB_PORT
          value: "5432"
        - name: LD_DB_DATABASE
          value: linkding
        - name: LD_DB_USER
          valueFrom:
            secretKeyRef:
              name: linkding-db-secret
              key: username
        - name: LD_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: linkding-db-secret
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: linkding
  namespace: default
spec:
  selector:
    app: linkding
  ports:
  - port: 9090
    targetPort: 9090